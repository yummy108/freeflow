name: 🤖 Auto-Research (Hourly)

on:
  schedule:
    - cron: '7 * * * *'

  workflow_dispatch:
    inputs:
      voice:
        description: 'Voice override'
        required: false
        type: string
        default: ''
      style:
        description: 'Visual style'
        required: false
        type: string
        default: 'mixed'
      aspect:
        description: 'Aspect ratio'
        required: false
        type: string
        default: '16:9'
      manual:
        description: 'Manual trigger'
        required: false
        type: string
        default: 'true'

concurrency:
  group: auto-research
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu fonts-noto-core
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install duckduckgo-search Pillow

      - name: Run auto-research
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m pipeline.auto_research \
            --voice "${{ inputs.voice }}" \
            --style "${{ inputs.style }}" \
            --aspect "${{ inputs.aspect }}" \
            --manual "${{ inputs.manual == 'true' }}"
