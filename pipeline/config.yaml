# FreeFlow Pipeline Configuration — HINDI-FIRST DEFAULTS

tts:
  default_voice: "hi-IN-SwaraNeural"
  prefer_engine: "edge"
  style_prompt: ""

voices:
  hindi_female: "hi-IN-SwaraNeural"
  hindi_male: "hi-IN-MadhurNeural"
  english_us_female: "en-US-AriaNeural"
  english_us_male: "en-US-GuyNeural"

llm:
  provider: "gemini"
  gemini_model: "gemini-2.5-flash"
  max_tokens: 4000
  temperature: 0.7

image:
  provider: "pollinations"
  width: 1920
  height: 1080
  model: "flux"

stock:
  provider: "pexels"
  per_page: 5
  orientation: "landscape"

subtitles:
  font: "Noto Sans Devanagari"
  fontsize: 60
  color: "&H00FFFFFF"
  outline: 3
  shadow: 2
  words_per_line: 3

video:
  fps: 30
  resolution:
    "16:9": [1920, 1080]
    "9:16": [1080, 1920]
  default_aspect: "16:9"
  bgm_volume: 0.15

music:
  volume: 0.15

output:
  workdir: "pipeline/work"
  releases_dir: "releases"
